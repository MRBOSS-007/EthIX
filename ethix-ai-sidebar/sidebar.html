<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethix AI</title>
  <link rel="stylesheet" href="sidebar.css" />
  <!-- Fira Code for code blocks, JetBrains Mono for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════ SIDEBAR SHELL ════════════════════════ -->
  <div class="ethix-shell">

    <!-- Header -->
    <header class="ethix-header">
      <div class="ethix-header-left">
        <div class="ethix-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#63CAB7" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="#63CAB7" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="#63CAB7" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="ethix-header-text">
          <span class="ethix-title">Ethix AI</span>
          <span class="ethix-subtitle">Assistant</span>
        </div>
      </div>

      <div class="ethix-header-right">
        <button class="ethix-btn-icon" id="ethix-clear-btn" title="Clear conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
        <button class="ethix-btn-icon ethix-close-btn" id="ethix-close-btn" title="Close sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Status bar -->
    <div class="ethix-statusbar">
      <span class="ethix-status-dot" id="ethix-status-dot"></span>
      <span class="ethix-status-text" id="ethix-status-text">Connected · localhost:8000</span>
    </div>

    <!-- Chat history -->
    <main class="ethix-chat" id="ethix-chat">
      <!-- Welcome message injected by JS -->
    </main>

    <!-- Typing indicator (hidden by default) -->
    <div class="ethix-typing" id="ethix-typing" aria-hidden="true">
      <div class="ethix-typing-avatar">AI</div>
      <div class="ethix-typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Input area -->
    <footer class="ethix-footer">
      <div class="ethix-input-wrap">
        <textarea
          id="ethix-input"
          class="ethix-input"
          placeholder="Ask anything… (Enter to send)"
          rows="1"
          maxlength="4000"
          aria-label="Message input"
        ></textarea>
        <button class="ethix-send-btn" id="ethix-send-btn" title="Send message" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="ethix-footer-hint">
        <span>Enter ↵ send</span>
        <span>Shift+Enter new line</span>
      </div>
    </footer>

  </div><!-- /.ethix-shell -->

  <script src="sidebar.js"></script>
</body>
</html>
